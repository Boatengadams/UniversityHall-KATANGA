name: CI and Firebase Deploy

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install functions deps
        run: npm --prefix functions ci

      - name: Lint
        run: npm run lint

  deploy:
    # Run only when manually triggered and secrets are present; skips on normal pushes/PRs
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && secrets.FIREBASE_TOKEN != ''
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm ci

      - name: Install functions deps
        run: npm --prefix functions ci

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npx firebase deploy --non-interactive
